services:
  - type: web
    name: fresh-guard
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: freshguard-db
          property: connectionString
    healthCheckPath: /
    healthCheckTimeout: 30

databases:
  - name: freshguard-db
    plan: free
    region: oregon
    databaseName: freshguard
    databaseUser: postgres
